<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نعيم الذاكرين</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-black text-white">
    <div id="root"></div>

    <script src="data.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { UI_DICT, RECITERS, PRAYER_CITIES, PRAYER_COUNTRIES, DAILY_AYAHS_REF, DAILY_DUAS, SURAH_VIRTUES } = window.NaimData;

        // --- COMPOSANTS DE L'APPLICATION ---
        // (Ici vous collez la logique de DashboardView, QuranTVView et App que vous avez créée)
        // Note: Assurez-vous d'utiliser les variables ci-dessus (ex: RECITERS au lieu de RECITERS_LIST)

        const App = () => {
            const [uiLang, setUiLang] = useState('ar');
            const [currentView, setCurrentView] = useState('home');
            const t = UI_DICT[uiLang];

            return (
                <div className="min-h-screen flex flex-col" dir={uiLang === 'ar' ? 'rtl' : 'ltr'}>
                    <nav className="p-4 bg-[#022c22] flex justify-between items-center border-b border-[#D4AF37]/30">
                        <h1 className="text-[#D4AF37] font-amiri text-2xl">{t.appTitle}</h1>
                        <div className="flex gap-4 font-cairo">
                            <button onClick={() => setCurrentView('home')}>{t.home}</button>
                            <button onClick={() => setCurrentView('tv')}>{t.quranPlayer}</button>
                        </div>
                    </nav>
                    <main className="flex-1 p-4">
                        {currentView === 'home' ? <div className="text-center mt-20 text-2xl">{t.loading}</div> : <div className="text-center mt-20 text-2xl">TV Coranique</div>}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
